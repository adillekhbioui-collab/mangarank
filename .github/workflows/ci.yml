name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manhwa-aggregator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend import smoke test
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: placeholder
        run: |
          python -c "import backend.main; print('backend import ok')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manhwa-aggregator/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: manhwa-aggregator/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://example-backend.onrender.com
        run: npm run build
